services:
  ros2:
    build:
      context: .
      platforms:
        - linux/arm64
    container_name: ros2_humble
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
      - PULSE_SERVER=${PULSE_SERVER}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg
      - ./ros2_ws:/root/ros2_ws
      - /dev:/dev
    network_mode: host
    privileged: true
