services:
  ros2:
    build:
      context: .
      platforms:
        - linux/arm64
    container_name: ros2_humble
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
      - PULSE_SERVER=${PULSE_SERVER}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg
      - ./ros2_ws:/root/ros2_ws
      - /dev:/dev
    network_mode: host
    privileged: true

# Jetson에서 GPU 가속(nvidia runtime + CUDA/cuDNN)을 쓰려면 override를 얹는다:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# GPU 설정을 이 파일에 직접 넣으면 nvidia 런타임이 없는 팀원 환경에서
# `unknown or invalid runtime name: nvidia` 로 컨테이너 생성 자체가 실패한다.
